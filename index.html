<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Amadori - Allevamento di Morro D'Oro</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family: Arial, sans-serif;
}

body{
    background:#28a745;
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
}

.container{
    text-align:center;
}

.logo{
    width:320px;
    max-width:90%;
    margin-bottom:40px;
}

button{
    background:white;
    color:#28a745;
    border:none;
    padding:15px 35px;
    font-size:22px;
    font-weight:bold;
    border-radius:12px;
    cursor:pointer;
    transition:0.3s;
    margin:10px;
}

button:hover{
    transform:scale(1.05);
}

#menu{
    display:none;
}

</style>
</head>

<body>

<div class="container">

    <!-- LOGO -->
    <img src="IMG_0139.PNG" class="logo" alt="Logo Amadori">

    <!-- BOTTONE ACCEDI -->
    <div id="accesso">
        <button onclick="mostraMenu()">ACCEDI</button>
    </div>

    <!-- MENU NASCOSTO -->
    <div id="menu">
        <button onclick="window.location.href='manutenzione.html'">
            Manutenzione
        </button>

        <button onclick="window.location.href='mangime.html'">
            Mangime
        </button>
    </div>

</div>

<script>

function mostraMenu(){
    document.getElementById("accesso").style.display = "none";
    document.getElementById("menu").style.display = "block";
}

</script>

</body>
</html>
